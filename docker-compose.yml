services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8077:8077"
    env_file: .env
    environment:
      DATA_DIR: /data
      OPENAI_ASSISTANT_STATE_FILE: /data/assistant_state.json
    volumes:
      - app_data:/data
      - uploads:/app/uploads

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_data:
  uploads:
