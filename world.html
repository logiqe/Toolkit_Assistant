<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Builder — Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>
<body class="world-page">

<header>
  <div class="header-left">
    <div class="header-title">TOOLKIT ASSISTANT / <span>World Builder</span></div>
  </div>
  <div class="header-right">
    <div class="mode-toggle world-mode-toggle" id="mode-toggle">
      <span class="mode-option" id="mode-mc">MC</span>
      <span class="mode-sep"></span>
      <span class="mode-option active" id="mode-vr">VR</span>
    </div>
    <div class="ws-indicator">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">board not connected</span>
    </div>
  </div>
</header>

<div class="main">

  <div class="chat-panel">
    <div class="chat-label">
      <span>Describe your world</span>
      <button class="clear-btn" id="clearBtn">⟳ Reset</button>
    </div>
    <div id="chatbox"></div>
    <div class="chat-footer">
      <div id="attachPreview" class="attach-preview" style="display:none;"></div>
      <div class="input-row">
        <label class="attach-btn" id="attachLabel" title="Attach image or 3D file">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          <input type="file" id="fileInput" accept="image/*,.glb,.gltf,.obj" multiple style="display:none;">
        </label>
        <input type="text" id="worldInput" placeholder="A dark forest with glowing mushrooms..." autocomplete="off">
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="world-panel" id="worldPanel">
    <div class="world-toolbar">
      <button id="vrBtn" class="toolbar-btn" title="Enter VR">Enter VR</button>
      <button class="tool-btn" id="passthroughBtn">◌ Passthrough</button>
      <button class="tool-btn" id="downloadBtn">↓ Download</button>
      <button class="tool-btn" id="fullscreenBtn">⛶ Fullscreen</button>
      <button class="tool-btn active" id="liveBtn">⬤ Live sensors</button>
    </div>

    <div class="empty-world" id="emptyState">
      <div class="empty-world-icon">🌐</div>
      <p>Your world will appear here.<br>Start by describing it on the left.</p>
    </div>

    <div id="flash-overlay"></div>
    <iframe 
      id="world-frame"
      allow="xr-spatial-tracking; microphone; camera"
      allowfullscreen
      allowvr="yes">
    </iframe>
    <div class="sensor-overlay" id="sensorOverlay"></div>
</div>

<script>
// ── URL PARAMS ──
const urlParams = new URLSearchParams(window.location.search);
const boardId = urlParams.get('board_id');

if (boardId) {
  document.getElementById('mode-mc').dataset.href = `/?board_id=${boardId}`;
} else {
  document.getElementById('mode-mc').dataset.href = '/';
}

document.getElementById('mode-mc').style.cursor = 'pointer';
document.getElementById('mode-mc').addEventListener('click', () => {
  const href = document.getElementById('mode-mc').dataset.href || '/';
  window.location.href = href;
});

// ── STATE ──
let worldCode = null;
let liveEnabled = true;
let sensorState = {};
let ws = null;

// ── STORAGE KEYS ──
const STORAGE_KEY      = `world_history_${boardId}`;
const WORLD_CODE_KEY   = `world_code_${boardId}`;

// ── PERSIST CHAT ──
function saveChatHistory() {
  // Store messages as structured data, not raw HTML
  const chatbox = document.getElementById('chatbox');
  const messages = [];
  chatbox.querySelectorAll('.msg').forEach(msg => {
    const side = msg.classList.contains('user') ? 'user' : 'ai';
    const bubble = msg.querySelector('.bubble');
    if (bubble) messages.push({ side, html: bubble.innerHTML });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadChatHistory() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return false;
  try {
    const messages = JSON.parse(saved);
    if (!messages.length) return false;
    const chatbox = document.getElementById('chatbox');
    chatbox.innerHTML = '';
    messages.forEach(({ side, html }) => {
      const msg = document.createElement('div');
      msg.className = `msg ${side}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${side}`;  
      bubble.innerHTML = html;
      msg.appendChild(bubble);
      chatbox.appendChild(msg);
    });
    chatbox.scrollTop = chatbox.scrollHeight;
    return true;
  } catch(e) {
    return false;
  }
}

async function clearHistory() {
  if (!confirm('Clear chat and world? This cannot be undone.')) return;
  
  // Vider côté serveur
  await fetch(`/world-clear?board_id=${boardId || 'none'}`, { method: 'POST' });
  
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(WORLD_CODE_KEY);
  localStorage.removeItem('world_code_latest');
  
  const chatbox = document.getElementById('chatbox');
  chatbox.innerHTML = '';
  showWelcome();
  
  const frame = document.getElementById('world-frame');
  frame.style.display = 'none';
  frame.srcdoc = '';
  worldCode = null;
  document.getElementById('emptyState').style.display = 'flex';
}

// ── SENSOR CHIPS ──
const knownSensors = ['button','touch','light','temperature','distance','potentiometer','tilt'];
const sensorOverlay = document.getElementById('sensorOverlay');

function buildSensorChips() {
  sensorOverlay.innerHTML = '';
  knownSensors.forEach(key => {
    const chip = document.createElement('div');
    chip.className = 'sensor-chip';
    chip.id = `chip-${key}`;
    chip.innerHTML = `<span class="key">${key}</span><span id="val-${key}">—</span>`;
    sensorOverlay.appendChild(chip);
  });
}
buildSensorChips();

// ── WEBSOCKET ──
function connectWS() {
  if (!boardId) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${boardId}`);

  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'ws-dot connected';
    document.getElementById('ws-label').textContent = `board_${boardId.slice(0,8)} connected`;
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'ws-dot';
    document.getElementById('ws-label').textContent = 'board not connected';
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (event) => {
    console.log('WS reçu à :', Date.now());
    try {
      const msg = JSON.parse(event.data);
      const data = msg.data || msg;

      Object.entries(data).forEach(([key, val]) => {
        const valEl = document.getElementById(`val-${key}`);
        const chip = document.getElementById(`chip-${key}`);
        if (valEl) {
          const prev = sensorState[key];
          const displayed = typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(1)) : val;
          valEl.textContent = displayed;
          if (String(prev) !== String(val)) {
            chip.classList.add('active');
            sensorState[key] = val;
            setTimeout(() => chip.classList.remove('active'), 800);
          }
        }
      });

      if (liveEnabled) {
        const frame = document.getElementById('world-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'sensor', data }, '*');
        }
      }
    } catch(e) {}
  };
}

connectWS();

// ── CHAT HELPERS ──
function addMsg(side, text) {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = `msg ${side}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${side}`;  
  bubble.textContent = text;
  msg.appendChild(bubble);
  chatbox.appendChild(msg);
  chatbox.scrollTop = chatbox.scrollHeight;
  return bubble;
}

function addLoading() {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'loading-msg';
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(indicator);
  chatbox.appendChild(msg);
  chatbox.scrollTop = chatbox.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function showWelcome() {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = 'msg ai';               
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';        
  bubble.innerHTML = `<strong>World Builder</strong><br><br>Describe the 3D world you want to create. Your physical sensors will interact with it in real time.<br><br><em style="opacity:0.6">Try: "A calm ocean at night, the water ripples when I press the button"</em>`;
  msg.appendChild(bubble);
  chatbox.appendChild(msg);
}

// ── ATTACHED FILES STATE ──
let pendingFiles = [];

document.getElementById('fileInput').addEventListener('change', function() {
  const newFiles = Array.from(this.files);
  pendingFiles = pendingFiles.concat(newFiles).slice(0, 4);
  renderAttachPreview();
  this.value = ''; // reset so same file can be re-added
});

function renderAttachPreview() {
  const preview = document.getElementById('attachPreview');
  if (!pendingFiles.length) { preview.style.display = 'none'; return; }
  preview.style.display = 'flex';
  preview.innerHTML = '';
  pendingFiles.forEach((file, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    const isImage = file.type.startsWith('image/');
    if (isImage) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.className = 'file-thumb';
      chip.appendChild(img);
    } else {
      const icon = document.createElement('span');
      icon.className = 'file-icon';
      icon.textContent = file.name.split('.').pop().toUpperCase();
      chip.appendChild(icon);
    }
    const name = document.createElement('span');
    name.className = 'file-name';
    name.textContent = file.name.length > 16 ? file.name.slice(0, 14) + '…' : file.name;
    chip.appendChild(name);
    const rm = document.createElement('button');
    rm.className = 'file-remove';
    rm.textContent = '×';
    rm.onclick = () => { pendingFiles.splice(i, 1); renderAttachPreview(); };
    chip.appendChild(rm);
    preview.appendChild(chip);
  });
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('worldInput');
  const text = input.value.trim();
  if (!text && !pendingFiles.length) return;

  // Show user message with file badges
  const userBubble = addMsg('user', text || '(files attached)');
  if (pendingFiles.length) {
    const badges = document.createElement('div');
    badges.className = 'file-badges';
    pendingFiles.forEach(f => {
      const b = document.createElement('span');
      b.className = 'file-badge';
      b.textContent = f.name;
      badges.appendChild(b);
    });
    userBubble.appendChild(badges);
  }

  const filesToSend = [...pendingFiles];
  pendingFiles = [];
  renderAttachPreview();
  input.value = '';
  addLoading();
  document.getElementById('sendBtn').disabled = true;

  try {
    let data;
    if (filesToSend.length > 0) {
      // Use multipart endpoint
      const form = new FormData();
      form.append('text', text);
      filesToSend.forEach(f => form.append('files', f));
      const res = await fetch(`/world-chat-with-files?board_id=${boardId || 'none'}`, {
        method: 'POST',
        body: form
      });
      data = await res.json();
    } else {
      // Use JSON endpoint (faster, no multipart overhead)
      const res = await fetch(`/world-chat?board_id=${boardId || 'none'}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      data = await res.json();
    }

    removeLoading();
    addMsg('ai', data.reply);

    if (data.scene_url) {
      currentSceneUrl = data.scene_url;
      injectWorld(data.world_code || '');
      if (data.world_code) {
        localStorage.setItem(WORLD_CODE_KEY, data.world_code);
        localStorage.setItem('scene_url_latest', data.scene_url);
      }
    } else if (data.world_code) {
      // Fallback (desktop): no scene_url
      worldCode = data.world_code;
      localStorage.setItem(WORLD_CODE_KEY, data.world_code);
      const frame = document.getElementById('world-frame');
      frame.srcdoc = data.world_code;
      frame.style.display = 'block';
      document.getElementById('emptyState').style.display = 'none';
    }
    saveChatHistory();

  } catch(e) {
    removeLoading();
    addMsg('ai', 'Connection error. Make sure the server is running.');
  }

  document.getElementById('sendBtn').disabled = false;
}

// ── INJECT WORLD ──
function injectWorld(html) {
  worldCode = html;
  const frame = document.getElementById('world-frame');
  const emptyState = document.getElementById('emptyState');

  // IMPORTANT: use src= pointing to /scene/<board_id> — NOT srcdoc.
  // srcdoc + sandbox blocks WebXR on Meta Quest (session never starts).
  // The bridge (sensor + passthrough) is injected server-side in /scene/<board_id>.
  if (currentSceneUrl) {
    frame.src = currentSceneUrl + '?t=' + Date.now(); // cache-bust
  }

  frame.style.display = 'block';
  emptyState.style.display = 'none';

  frame.addEventListener('load', () => {
    // Re-apply passthrough if active
    if (passthroughEnabled && frame.contentWindow) {
      setTimeout(() => {
        frame.contentWindow.postMessage({ type: 'passthrough', enabled: true }, '*');
      }, 800);
    }
  }, { once: true });
}

// Current scene URL (set when server returns scene_url)
let currentSceneUrl = null;

// ── PASSTHROUGH STATE ──
let passthroughEnabled = false;

// ── TOOLBAR ──
document.getElementById('vrBtn').addEventListener('click', () => {
  if (!currentSceneUrl) {
    alert('Generate a world first, then click Enter VR.');
    return;
  }
  // Open in new tab — WebXR requires top-level browsing context on Meta Quest
  // Pass board_id so the standalone scene can connect WebSocket for live sensors
  const vrUrl = currentSceneUrl + '?vr=1&board_id=' + (boardId || 'none');
  window.location.href = vrUrl;
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  const panel = document.getElementById('worldPanel');
  if (document.fullscreenElement) document.exitFullscreen();
  else panel.requestFullscreen();
});

document.getElementById('liveBtn').addEventListener('click', () => {
  liveEnabled = !liveEnabled;
  const btn = document.getElementById('liveBtn');
  btn.classList.toggle('active', liveEnabled);
  btn.textContent = liveEnabled ? '⬤ Live sensors' : '◯ Live sensors';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!worldCode) { alert('No world to download yet. Generate one first!'); return; }
  const blob = new Blob([worldCode], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `world_${boardId || 'scene'}_${Date.now()}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('passthroughBtn').addEventListener('click', () => {
  passthroughEnabled = !passthroughEnabled;
  const btn = document.getElementById('passthroughBtn');
  btn.classList.toggle('active', passthroughEnabled);
  btn.textContent = passthroughEnabled ? '● Passthrough ON' : '◌ Passthrough';

  const panel = document.getElementById('worldPanel');
  const frame = document.getElementById('world-frame');

  // Make parent containers transparent
  panel.style.background = passthroughEnabled ? 'transparent' : '#080808';

  // iframe background — must use both style and postMessage
  if (passthroughEnabled) {
    frame.style.setProperty('background', 'transparent', 'important');
    frame.style.setProperty('background-color', 'transparent', 'important');
  } else {
    frame.style.removeProperty('background');
    frame.style.removeProperty('background-color');
  }

  // Post to iframe — now works because iframe uses src= (real origin), not srcdoc (null origin)
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'passthrough', enabled: passthroughEnabled }, '*');
  }
});
document.getElementById('clearBtn').addEventListener('click', clearHistory);

// ── INPUT EVENTS ──
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('worldInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── INIT ──
(async function() {
  try {
    const res = await fetch(`/world-state?board_id=${boardId || 'none'}`);
    const data = await res.json();
    
    const chatbox = document.getElementById('chatbox');
    
    if (data.chat_messages && data.chat_messages.length > 0) {
      // Restore chat
      data.chat_messages.forEach(({ side, text }) => {
        const msg = document.createElement('div');
        msg.className = `msg ${side}`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${side}`;
        const displayText = Array.isArray(text)
          ? text.filter(b => b.type === 'text').map(b => b.text).join(' ')
          : (typeof text === 'string' ? text : JSON.stringify(text));
        
        bubble.textContent = displayText;
        msg.appendChild(bubble);
        chatbox.appendChild(msg);
      });
      chatbox.scrollTop = chatbox.scrollHeight;
    } else {
      showWelcome();
    }
    
    // Restore world — prefer /scene/<board_id> URL
    if (data.world_code) {
      currentSceneUrl = `/scene/${boardId || 'none'}`;
      injectWorld(data.world_code);
    } else {
      // Fallback: localStorage scene URL only (never srcdoc — breaks WebXR on Quest)
      const savedUrl = localStorage.getItem('scene_url_latest');
      if (savedUrl) {
        currentSceneUrl = savedUrl;
        injectWorld('');
      }
      // ← srcdoc fallback supprimé intentionnellement
    }
  } catch(e) {
    showWelcome();
  }
})();
</script>

</body>
</html>
