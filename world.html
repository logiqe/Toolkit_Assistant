<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Builder — Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --accent: #FF8B33;
    --accent-dim: rgba(255,139,51,0.15);
    --text: #f0ede8;
    --text-muted: #6b6660;
    --text-secondary: #a09890;
    --user-bg: #FF8B33;
    --ai-bg: #1f1f1f;
    --radius: 14px;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 5px 12px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .header-title {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }
  .header-title span { color: var(--accent); }

  .ws-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .ws-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .ws-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .ws-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── LEFT : CHAT ── */
  .chat-panel {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }

  .chat-label {
    padding: 12px 18px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  #chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chatbox::-webkit-scrollbar { width: 4px; }
  #chatbox::-webkit-scrollbar-track { background: transparent; }
  #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; }
  .msg.user { align-items: flex-end; }
  .msg.ai { align-items: flex-start; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #1a0a00;
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    font-weight: 300;
  }

  .typing-indicator {
    display: flex; align-items: center; gap: 4px;
    height: 20px;
    padding: 10px 14px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-indicator span {
    width: 5px; height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite both;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

  /* ── SENSOR EVENT BADGE ── */
  .sensor-badge {
    align-self: center;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(255,139,51,0.3);
    border-radius: 20px;
    color: var(--accent);
    letter-spacing: 0.05em;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* ── CHAT INPUT ── */
  .chat-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 8px 6px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(255,139,51,0.4); }

  #worldInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text);
    min-width: 0;
  }
  #worldInput::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--accent);
    border: none;
    width: 32px; height: 32px;
    border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { width: 15px; height: 15px; fill: #1a0a00; }

  /* ── RIGHT : WORLD PREVIEW ── */
  .world-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    background: #080808;
  }

  .world-toolbar {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    display: flex;
    gap: 8px;
  }

  .tool-btn {
    background: rgba(14,14,14,0.85);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  #world-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #050505;
  }

  .empty-world {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
  }

  .empty-world-icon {
    width: 64px; height: 64px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    opacity: 0.3;
  }

  .empty-world p {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.7;
    max-width: 240px;
  }

  /* ── SENSOR OVERLAY ── */
  .sensor-overlay {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  .sensor-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(14,14,14,0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-secondary);
    backdrop-filter: blur(8px);
    transition: all 0.3s;
    opacity: 0.6;
  }
  .sensor-chip.active {
    border-color: rgba(255,139,51,0.4);
    color: var(--accent);
    opacity: 1;
  }
  .sensor-chip .key { color: var(--text-muted); margin-right: 2px; }

  /* ── FLASH OVERLAY ── */
  #flash-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="javascript:history.back()" class="back-btn">
      ← Back
    </a>
    <div class="header-title">TOOLKIT / <span>World Builder</span></div>
  </div>
  <div class="ws-indicator">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-label">board not connected</span>
  </div>
</header>

<div class="main">

  <!-- ── CHAT PANEL ── -->
  <div class="chat-panel">
    <div class="chat-label">Describe your world</div>
    <div id="chatbox"></div>
    <div class="chat-footer">
      <div class="input-row">
        <input type="text" id="worldInput" placeholder="A dark forest with glowing mushrooms..." autocomplete="off">
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── WORLD PANEL ── -->
  <div class="world-panel" id="worldPanel">

    <div class="world-toolbar">
      <button class="tool-btn" id="fullscreenBtn">⛶ Fullscreen</button>
      <button class="tool-btn active" id="liveBtn">⬤ Live sensors</button>
    </div>

    <!-- Empty state -->
    <div class="empty-world" id="emptyState">
      <div class="empty-world-icon">🌐</div>
      <p>Your world will appear here.<br>Start by describing it on the left.</p>
    </div>

    <!-- Flash overlay for sensor events -->
    <div id="flash-overlay"></div>

    <!-- 3D World iframe -->
    <iframe id="world-frame" style="display:none;" sandbox="allow-scripts allow-same-origin"></iframe>

    <!-- Sensor chips overlay -->
    <div class="sensor-overlay" id="sensorOverlay"></div>

  </div>
</div>

<script>
// ── URL PARAMS ──
const urlParams = new URLSearchParams(window.location.search);
const boardId = urlParams.get('board_id');

// ── STATE ──
let worldCode = null;
let liveEnabled = true;
let sensorState = {};
let ws = null;

// ── SENSOR CHIPS ──
const knownSensors = ['button','touch','light','temperature','distance','potentiometer','tilt'];
const sensorOverlay = document.getElementById('sensorOverlay');

function buildSensorChips() {
  sensorOverlay.innerHTML = '';
  knownSensors.forEach(key => {
    const chip = document.createElement('div');
    chip.className = 'sensor-chip';
    chip.id = `chip-${key}`;
    chip.innerHTML = `<span class="key">${key}</span><span id="val-${key}">—</span>`;
    sensorOverlay.appendChild(chip);
  });
}
buildSensorChips();

// ── WEBSOCKET ──
function connectWS() {
  if (!boardId) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${boardId}`);

  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'ws-dot connected';
    document.getElementById('ws-label').textContent = `board_${boardId.slice(0,8)} connected`;
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'ws-dot';
    document.getElementById('ws-label').textContent = 'board not connected';
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      const data = msg.data || msg;

      // Update sensor chips
      let anyActive = false;
      Object.entries(data).forEach(([key, val]) => {
        const valEl = document.getElementById(`val-${key}`);
        const chip = document.getElementById(`chip-${key}`);
        if (valEl) {
          const prev = sensorState[key];
          const displayed = typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(1)) : val;
          valEl.textContent = displayed;
          if (String(prev) !== String(val)) {
            chip.classList.add('active');
            anyActive = true;
            sensorState[key] = val;
            setTimeout(() => chip.classList.remove('active'), 800);
          }
        }
      });

      // Notify iframe
      if (liveEnabled) {
        const frame = document.getElementById('world-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'sensor', data }, '*');
        }
        // Show sensor badge in chat
        if (anyActive) showSensorBadge(data);
      }
    } catch(e) {}
  };
}

connectWS();

function showSensorBadge(data) {
  const changed = Object.entries(data)
    .filter(([k]) => knownSensors.includes(k))
    .map(([k, v]) => `${k}:${typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(1)) : v}`)
    .join(' ');
  if (!changed) return;
  const chatbox = document.getElementById('chatbox');
  const badge = document.createElement('div');
  badge.className = 'sensor-badge';
  badge.textContent = `⬤ ${changed}`;
  chatbox.appendChild(badge);
  chatbox.scrollTop = chatbox.scrollHeight;
  setTimeout(() => badge.remove(), 4000);
}

// ── CHAT ──
function addMsg(side, text) {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = `msg ${side}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(bubble);
  chatbox.appendChild(msg);
  chatbox.scrollTop = chatbox.scrollHeight;
  return bubble;
}

function addLoading() {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'loading-msg';
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(indicator);
  chatbox.appendChild(msg);
  chatbox.scrollTop = chatbox.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('worldInput');
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';
  addLoading();

  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`/world-chat?board_id=${boardId || 'none'}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    removeLoading();

    addMsg('ai', data.reply);

    if (data.world_code) {
      injectWorld(data.world_code);
    }
  } catch(e) {
    removeLoading();
    addMsg('ai', 'Connection error. Make sure the server is running.');
  }

  document.getElementById('sendBtn').disabled = false;
}

// ── INJECT WORLD ──
function injectWorld(html) {
  worldCode = html;
  const frame = document.getElementById('world-frame');
  const emptyState = document.getElementById('emptyState');

  // Inject WebSocket bridge code into the world HTML
  const bridgeScript = `
    <script>
    window.sensorData = {};
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'sensor') {
        window.sensorData = e.data.data;
        if (typeof window.onSensorUpdate === 'function') {
          window.onSensorUpdate(e.data.data);
        }
      }
    });
    <\/script>
  `;
  const injected = html.replace('</head>', bridgeScript + '</head>').replace('<body', bridgeScript + '<body');
  const blob = new Blob([injected.includes('<script') ? injected : bridgeScript + injected], { type: 'text/html' });
  const url = URL.createObjectURL(blob);

  frame.src = url;
  frame.style.display = 'block';
  emptyState.style.display = 'none';
}

// ── TOOLBAR BUTTONS ──
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  const panel = document.getElementById('worldPanel');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    panel.requestFullscreen();
  }
});

document.getElementById('liveBtn').addEventListener('click', () => {
  liveEnabled = !liveEnabled;
  const btn = document.getElementById('liveBtn');
  btn.classList.toggle('active', liveEnabled);
  btn.textContent = liveEnabled ? '⬤ Live sensors' : '◯ Live sensors';
});

// ── INPUT EVENTS ──
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('worldInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── WELCOME MESSAGE ──
(function() {
  const chatbox = document.getElementById('chatbox');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<strong>World Builder</strong><br><br>Describe the 3D world you want to create. Your physical sensors will interact with it in real time.<br><br><em style="opacity:0.6">Try: "A calm ocean at night, the water ripples when I press the button"</em>`;
  msg.appendChild(bubble);
  chatbox.appendChild(msg);
})();
</script>

</body>
</html>
