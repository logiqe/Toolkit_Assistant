<!DOCTYPE html>
<html>
<head>
    <title>Toolkit Assistant</title>
    <!-- On lie le fichier CSS ici -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <span>Toolkit Assistant</span>
        <button id="reset-btn" title="Restart">⟳</button>
    </header>

    <div id="chatbox">
        <!-- Les messages s'afficheront ici -->
    </div>

    <div class="footer-area">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Message...">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const boardId = urlParams.get('id') || urlParams.get('board_id');

        if (!boardId) {
            console.error("No board id detected");
        }

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const text = inputField.value;
            if (!text || !boardId) return;

            const chatbox = document.getElementById("chatbox");

            // 1. Afficher le message utilisateur
            chatbox.innerHTML += `
                <div class="message-container user-container">
                    <div class="bubble user">${text}</div>
                </div>`;
            
            inputField.value = "";
            chatbox.scrollTop = chatbox.scrollHeight;

            // 2. Afficher la bulle de chargement
            const loadingId = "loading-" + Date.now();
            chatbox.innerHTML += `
                <div class="message-container ai-container" id="${loadingId}">
                    <div class="bubble ai typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
            chatbox.scrollTop = chatbox.scrollHeight;

            // 3. Appel API
            try {
                const response = await fetch(`/chat?board_id=${boardId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                // 4. Supprimer la bulle et afficher la réponse
                document.getElementById(loadingId).remove();
                chatbox.innerHTML += `
                    <div class="message-container ai-container">
                        <div class="bubble ai">${data.reply || data.answer}</div>
                    </div>`;
                
                chatbox.scrollTop = chatbox.scrollHeight;

                // 5. NOUVEAU : Vérifier si c'est une commande de calibration
                // Adapte "data.command" ou "data.MQTT_value.command" selon ce que ton serveur renvoie
                const cmd = data.command || (data.MQTT_value && data.MQTT_value.command);
                if (cmd && cmd.startsWith("calibrate_")) {
                    startCountdownUi();
                }

            } catch (error) {
                document.getElementById(loadingId).innerHTML = '<div class="bubble ai" style="background:#ffcccc">Erreur de connexion.</div>';
            }
            
            chatbox.scrollTop = chatbox.scrollHeight;
        };

        // Fonction qui gère l'affichage du compte à rebours
        function startCountdownUi() {
            const chatbox = document.getElementById("chatbox");
            const timerId = "timer-" + Date.now();
            
            chatbox.innerHTML += `
                <div class="message-container ai-container">
                    <div class="countdown-box" id="${timerId}">
                        <div class="countdown-title">Starting in...</div>
                        <div class="countdown-time">5</div>
                    </div>
                </div>`;
            chatbox.scrollTop = chatbox.scrollHeight;

            const timerEl = document.getElementById(timerId);
            const titleEl = timerEl.querySelector('.countdown-title');
            const timeEl = timerEl.querySelector('.countdown-time');

            let timeLeft = 5;
            let phase = "prep"; // "prep" (5s) puis "calib" (25s)

            const interval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft > 0) {
                    timeEl.innerText = timeLeft;
                } else {
                    if (phase === "prep") {
                        // Passer à la phase de 25s
                        phase = "calib";
                        timeLeft = 25;
                        titleEl.innerText = "Calibrating...";
                        timerEl.classList.add("recording");
                        timeEl.innerText = timeLeft;
                    } else {
                        // Terminé !
                        clearInterval(interval);
                        titleEl.innerText = "Calibration done!";
                        timeEl.innerText = "✓";
                        timerEl.classList.remove("recording");
                        timerEl.classList.add("done");
                    }
                }
            }, 1000);
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { sendMessage(); }
        });

        const chatbox = document.getElementById("chatbox");

        // Fonction pour charger le message de bienvenue
        async function loadWelcome() {
            const response = await fetch("/welcome");
            const data = await response.json();
            chatbox.innerHTML = `
                <div class="message-container ai-container">
                    <div class="bubble ai">${data.message}</div>
                </div>`;
        }

        async function initPage() {
            try {
                // MODIFIÉ : On demande l'historique spécifique à cet ID
                if (boardId) {
                    const response = await fetch(`/history?board_id=${boardId}`);
                    const data = await response.json();

                    if (data.history && data.history.length > 0) {
                        chatbox.innerHTML = "";
                        data.history.forEach(msg => {
                            const side = msg.sender === "user" ? "user" : "ai";
                            chatbox.innerHTML += `
                                <div class="message-container ${side}-container">
                                    <div class="bubble ${side}">${msg.text}</div>
                                </div>`;
                        });
                        chatbox.scrollTop = chatbox.scrollHeight;
                    } else {
                        await loadWelcome();
                    }
                } else {
                    await loadWelcome();
                }
            } catch (error) {
                console.error("Erreur de chargement :", error);
                await loadWelcome();
            }
        }

        // Au chargement de la page, on lance notre nouvelle fonction
        window.onload = initPage;

        // Logique du bouton Restart
        document.getElementById("reset-btn").addEventListener("click", async () => {
            if (confirm("Do you want to start a new conversation?")) {
                const response = await fetch(`/reset?board_id=${boardId}`, { method: "POST" });
                if (response.ok) {
                    chatbox.innerHTML = ""; // Vide l'écran
                    await loadWelcome();    // Remet le message de bienvenue
                }
            }
        });
    </script>
</body>
</html>
