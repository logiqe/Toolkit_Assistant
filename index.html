<!DOCTYPE html>
<html>
<head>
<base href="/toolkit-assistant/">
<script>const _f=fetch;fetch=(u,...a)=>_f(typeof u==='string'&&u.startsWith('/')?document.baseURI.replace(/\/$/,'')+u:u,...a);</script>
    <title>Toolkit Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFE3CE">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="header-title">TOOLKIT ASSISTANT / <span>Artefact</span></div>
        </div>
        <div class="header-right">
            <div class="mode-toggle" id="mode-toggle">
                <span class="mode-option active" id="mode-mc">MC</span>
                <span class="mode-sep"></span>
                <span class="mode-option" id="mode-vr">VR</span>
            </div>
            <div class="ws-indicator" id="ws-indicator">
                <div class="ws-dot" id="ws-dot"></div>
                <span id="ws-label">board not connected</span>
            </div>
        </div>
    </header>

    <div class="chat-label-bar">
        <span>Talk to your board</span>
        <button id="reset-btn" class="clear-btn-warm">⟳ Reset</button>
    </div>

    <div id="chatbox"></div>

    <div class="footer-area">
        <div class="input-row-warm">
            <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
            <button class="send-btn-warm" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="#FFE3CE">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
        <div class="credit">Inspired by <a href="https://promptingrealities.com" target="_blank">Prompting Realities</a> and <a href="https://mahanmehrvarz.name" target="_blank">Mahan Mehrvarz</a>'s work</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let boardId = urlParams.get('board_id');

        // ── WEBSOCKET ──
        let ws = null;
        function connectWS() {
            if (!boardId) return;
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}${new URL('ws/'+boardId, document.baseURI).pathname}`);

            ws.onopen = () => {
                document.getElementById('ws-dot').className = 'ws-dot connected';
                document.getElementById('ws-label').textContent = `board_${boardId.slice(0,8)} connected`;
            };

            ws.onclose = () => {
                document.getElementById('ws-dot').className = 'ws-dot';
                document.getElementById('ws-label').textContent = 'board not connected';
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => {
                try { ws.close(); } catch(e) {}
            };

            ws.onmessage = (event) => {
                // Optionnel : traiter les messages capteurs ici si besoin
                try {
                    const msg = JSON.parse(event.data);
                    // ... ton handling éventuel
                } catch(e) {}
            };
        }

        connectWS();


        if (!boardId) {
            console.error("No board id detected");
        }

        // ── Mode toggle: MC actif ici, VR → world page ──
        const modeVrEl = document.getElementById('mode-vr');
        modeVrEl.style.cursor = 'pointer';
        modeVrEl.addEventListener('click', () => {
            window.location.href = boardId ? `${document.baseURI}world?board_id=${boardId}` : `${document.baseURI}world`;
        });

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const text = inputField.value.trim();
            if (!text || !boardId) return;

            const chatbox = document.getElementById("chatbox");

            chatbox.innerHTML += `
                <div class="message-container user-container">
                    <div class="bubble user">${text}</div>
                </div>`;
            inputField.value = "";
            chatbox.scrollTop = chatbox.scrollHeight;

            const loadingId = "loading-" + Date.now();
            chatbox.innerHTML += `
                <div class="message-container ai-container" id="${loadingId}">
                    <div class="bubble ai typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
            chatbox.scrollTop = chatbox.scrollHeight;

            try {
                const response = await fetch(`/chat?board_id=${boardId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                document.getElementById(loadingId).remove();
                chatbox.innerHTML += `
                    <div class="message-container ai-container">
                        <div class="bubble ai">${data.reply || data.answer}</div>
                    </div>`;
                chatbox.scrollTop = chatbox.scrollHeight;

                const cmd = data.command || (data.MQTT_value && data.MQTT_value.command);
                if (cmd && cmd.startsWith("calibrate_")) {
                    startCountdownUi();
                }
            } catch (error) {
                document.getElementById(loadingId).innerHTML = '<div class="bubble ai" style="background:#ffcccc">Erreur de connexion.</div>';
            }
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function startCountdownUi() {
            const chatbox = document.getElementById("chatbox");
            const timerId = "timer-" + Date.now();
            chatbox.innerHTML += `
                <div class="message-container ai-container">
                    <div class="countdown-box" id="${timerId}">
                        <div class="countdown-title">Starting in...</div>
                        <div class="countdown-time">5</div>
                    </div>
                </div>`;
            chatbox.scrollTop = chatbox.scrollHeight;

            const timerEl = document.getElementById(timerId);
            const titleEl = timerEl.querySelector('.countdown-title');
            const timeEl  = timerEl.querySelector('.countdown-time');
            let timeLeft = 5, phase = "prep";

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timeEl.innerText = timeLeft;
                } else {
                    if (phase === "prep") {
                        phase = "calib"; timeLeft = 25;
                        titleEl.innerText = "Calibrating...";
                        timerEl.classList.add("recording");
                        timeEl.innerText = timeLeft;
                    } else {
                        clearInterval(interval);
                        titleEl.innerText = "Calibration done!";
                        timeEl.innerText = "✓";
                        timerEl.classList.remove("recording");
                        timerEl.classList.add("done");
                    }
                }
            }, 1000);
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { sendMessage(); }
        });

        const chatbox = document.getElementById("chatbox");

        async function loadWelcome() {
            const response = await fetch("/welcome");
            const data = await response.json();
            chatbox.innerHTML = `
                <div class="message-container ai-container">
                    <div class="bubble ai">${data.message}</div>
                </div>`;
        }

        async function initPage() {
            try {
                if (boardId) {
                    const response = await fetch(`/history?board_id=${boardId}`);
                    const data = await response.json();
                    if (data.history && data.history.length > 0) {
                        chatbox.innerHTML = "";
                        data.history.forEach(msg => {
                            const side = msg.sender === "user" ? "user" : "ai";
                            chatbox.innerHTML += `
                                <div class="message-container ${side}-container">
                                    <div class="bubble ${side}">${msg.text}</div>
                                </div>`;
                        });
                        chatbox.scrollTop = chatbox.scrollHeight;
                    } else {
                        await loadWelcome();
                    }
                } else {
                    await loadWelcome();
                }
            } catch (error) {
                console.error("Erreur de chargement :", error);
                await loadWelcome();
            }
        }

        window.onload = initPage;

        async function doReset() {
            if (confirm("Do you want to start a new conversation?")) {
                const response = await fetch(`/reset?board_id=${boardId}`, { method: "POST" });
                if (response.ok) {
                    chatbox.innerHTML = "";
                    await loadWelcome();
                }
            }
        }

        document.getElementById("reset-btn").addEventListener("click", doReset);
    </script>
</body>
</html>
