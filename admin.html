<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolkit Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FFE3CE;
            --brown: #5E2A03;
            --orange: #FF8B33;
            --white: #ffffff;
            --border: #2c2c2c;
            --red: #e74c3c;
            --green: #2ed573;
            --muted: #888;
            --card-bg: #fff8f3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--brown);
            min-height: 100vh;
        }

        /* ---- LOGIN PAGE ---- */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
        }

        #login-page h1 {
            font-size: 1.6em;
            font-weight: 700;
        }

        #login-page p {
            color: var(--muted);
            font-size: 14px;
        }

        .login-box {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ---- ADMIN DASHBOARD ---- */
        #admin-page { display: none; flex-direction: column; min-height: 100vh; }

        header {
            background: var(--bg);
            border-bottom: 1px solid rgba(0,0,0,0.07);
            padding: 16px clamp(16px, 5vw, 48px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1em;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header span { color: var(--brown); }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        main {
            padding: clamp(16px, 4vw, 48px);
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* ---- CARDS ---- */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card-title {
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--orange);
        }

        /* ---- FORM ELEMENTS ---- */
        .field { display: flex; flex-direction: column; gap: 6px; }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--white);
            color: var(--brown);
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, select:focus { border-color: var(--orange); }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 500px) { .field-row { grid-template-columns: 1fr; } }

        /* ---- BUTTONS ---- */
        button, .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--brown);
            color: var(--white);
        }

        .btn-orange {
            background: var(--orange);
            color: var(--white);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--brown);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        button:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ---- STATUS BADGE ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .badge-green { background: #d4fce8; color: #1a7a45; }
        .badge-red   { background: #fce4e4; color: #a01a1a; }
        .badge-dot   { width: 7px; height: 7px; border-radius: 50%; }
        .badge-green .badge-dot { background: #2ed573; }
        .badge-red   .badge-dot { background: var(--red); }

        /* ---- SESSIONS TABLE ---- */
        .sessions-list { display: flex; flex-direction: column; gap: 10px; }

        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            padding: 12px 16px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .session-id {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .session-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .session-actions { display: flex; gap: 8px; align-items: center; }

        /* ---- TOAST ---- */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--brown);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ---- MISC ---- */
        .section-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            padding: 20px 0;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.07);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="login-page">
    <h1>Toolkit Admin</h1>
    <p>Enter your password to continue</p>
    <div class="login-box">
        <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autofocus>
        </div>
        <div id="login-error" style="color: var(--red); font-size:13px; display:none;">Wrong password.</div>
        <button class="btn-primary" onclick="doLogin()">Sign in</button>
    </div>
</div>

<!-- ===== ADMIN DASHBOARD ===== -->
<div id="admin-page">
    <header>
        <span>Toolkit Admin</span>
        <div class="header-actions">
            <div id="mqtt-badge" class="badge badge-red"><span class="badge-dot"></span> MQTT</div>
            <button class="btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
        </div>
    </header>

    <main>

        <!-- AI CONFIG -->
        <div class="card">
            <div class="card-title">AI Configuration</div>

            <div class="field-row">
                <div class="field">
                    <label>Model</label>
                    <select id="cfg-model">
                        <option value="gpt-4o-mini">gpt-4o-mini (fast, cheap)</option>
                        <option value="gpt-4o">gpt-4o (smart, slower)</option>
                        <option value="gpt-4-turbo">gpt-4-turbo</option>
                        <option value="gpt-3.5-turbo">gpt-3.5-turbo (legacy)</option>
                    </select>
                </div>
                <div class="field">
                    <label>OpenAI API Key</label>
                    <input type="password" id="cfg-openai-key" placeholder="sk-...">
                </div>
            </div>

            <div class="field">
                <label>Welcome message</label>
                <input type="text" id="cfg-welcome" placeholder="Welcome! How can I help?">
            </div>

            <div class="section-actions">
                <button class="btn-primary" onclick="saveAIConfig()">Save AI config</button>
            </div>
        </div>

        <!-- MQTT CONFIG -->
        <div class="card">
            <div class="card-title">MQTT Configuration</div>

            <div class="field-row">
                <div class="field">
                    <label>Broker</label>
                    <input type="text" id="cfg-broker" placeholder="broker.example.com">
                </div>
                <div class="field">
                    <label>Port</label>
                    <input type="text" id="cfg-port" placeholder="1883">
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="cfg-mqtt-user" placeholder="username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="cfg-mqtt-password" placeholder="••••••••">
                </div>
            </div>

            <div class="section-actions">
                <button class="btn-ghost" onclick="testMQTT()">Test connection</button>
                <button class="btn-primary" onclick="saveMQTTConfig()">Save MQTT config</button>
            </div>
        </div>

        <!-- RESTART -->
        <div class="card">
            <div class="card-title">Server</div>
            <p style="font-size:14px; color: var(--muted);">
                Restart the server to apply configuration changes. Active sessions are saved before restart.
            </p>
            <div class="section-actions">
                <button class="btn-orange" onclick="doRestart()">Save & Restart server</button>
            </div>
        </div>

        <!-- SESSIONS -->
        <div class="card">
            <div class="card-title">Active sessions</div>
            <div id="sessions-list" class="sessions-list">
                <div class="empty-state">Loading...</div>
            </div>
            <hr class="divider">
            <div class="section-actions">
                <button class="btn-danger btn-sm" onclick="clearAllSessions()">Clear all sessions</button>
            </div>
        </div>

    </main>
</div>

<div id="toast"></div>

<script>
    const loginPage = document.getElementById("login-page");
    const adminPage = document.getElementById("admin-page");
    let isLoggedIn = false;

    // ---- AUTH ----

    async function doLogin() {
        const pw = document.getElementById("login-password").value;
        const err = document.getElementById("login-error");
        err.style.display = "none";

        const res = await fetch("/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw })
        });

        if (res.ok) {
            isLoggedIn = true;
            loginPage.style.display = "none";
            adminPage.style.display = "flex";
            loadAll();
        } else {
            err.style.display = "block";
        }
    }

    document.getElementById("login-password").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
    });

    async function doLogout() {
        await fetch("/admin/logout", { method: "POST" });
        isLoggedIn = false;
        adminPage.style.display = "none";
        loginPage.style.display = "flex";
        document.getElementById("login-password").value = "";
    }

    // Check if already authenticated (cookie still valid)
    async function checkAuth() {
        const res = await fetch("/admin/config");
        if (res.ok) {
            isLoggedIn = true;
            loginPage.style.display = "none";
            adminPage.style.display = "flex";
            loadAll();
        }
    }

    // ---- LOAD ALL ----

    async function loadAll() {
        await loadConfig();
        await loadSessions();
        await checkMQTT();
    }

    // ---- CONFIG ----

    async function loadConfig() {
        const res = await fetch("/admin/config");
        if (!res.ok) return;
        const cfg = await res.json();

        // AI
        const modelSelect = document.getElementById("cfg-model");
        const modelVal = cfg["ASSISTANT_MODEL"] || cfg["assistant_model"] || "";
        for (let opt of modelSelect.options) {
            if (opt.value === modelVal) { opt.selected = true; break; }
        }
        document.getElementById("cfg-welcome").value = cfg["WELCOM_MSG"] || cfg["Welcom_msg"] || "";

        // MQTT
        document.getElementById("cfg-broker").value = cfg["MQTT_BROKER"] || cfg["broker"] || "";
        document.getElementById("cfg-port").value = cfg["MQTT_PORT"] || "1883";
        document.getElementById("cfg-mqtt-user").value = cfg["MQTT_USER"] || cfg["mqtt_user"] || "";
    }

    async function saveField(key, value) {
        await fetch("/admin/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, value })
        });
    }

    async function saveAIConfig() {
        const model = document.getElementById("cfg-model").value;
        const key = document.getElementById("cfg-openai-key").value;
        const welcome = document.getElementById("cfg-welcome").value;

        const tasks = [saveField("ASSISTANT_MODEL", model)];
        if (key && !key.includes("*")) tasks.push(saveField("OPENAI_API_KEY", key));
        if (welcome) tasks.push(saveField("WELCOM_MSG", welcome));

        await Promise.all(tasks);
        toast("AI config saved ✓");
    }

    async function saveMQTTConfig() {
        const broker = document.getElementById("cfg-broker").value;
        const port = document.getElementById("cfg-port").value;
        const user = document.getElementById("cfg-mqtt-user").value;
        const pw = document.getElementById("cfg-mqtt-password").value;

        const tasks = [
            saveField("MQTT_BROKER", broker),
            saveField("MQTT_PORT", port),
            saveField("MQTT_USER", user),
        ];
        if (pw && !pw.includes("*")) tasks.push(saveField("MQTT_PASSWORD", pw));

        await Promise.all(tasks);
        toast("MQTT config saved ✓");
    }

    // ---- MQTT TEST ----

    async function checkMQTT() {
        const res = await fetch("/admin/mqtt-test");
        if (!res.ok) return;
        const data = await res.json();
        const badge = document.getElementById("mqtt-badge");
        badge.className = "badge " + (data.connected ? "badge-green" : "badge-red");
        badge.innerHTML = `<span class="badge-dot"></span> MQTT`;
    }

    async function testMQTT() {
        toast("Testing MQTT...");
        await checkMQTT();
        const badge = document.getElementById("mqtt-badge");
        toast(badge.classList.contains("badge-green") ? "MQTT connected ✓" : "MQTT not reachable ✗");
    }

    // ---- SESSIONS ----

    async function loadSessions() {
        const res = await fetch("/admin/logs");
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById("sessions-list");

        const ids = Object.keys(data);
        if (ids.length === 0) {
            list.innerHTML = `<div class="empty-state">No active sessions</div>`;
            return;
        }

        list.innerHTML = ids.map(id => {
            const s = data[id];
            const msgCount = s.history ? s.history.length : 0;
            return `
                <div class="session-row" id="row-${id}">
                    <div>
                        <div class="session-id">${id}</div>
                        <div class="session-meta">${msgCount} messages</div>
                    </div>
                    <div class="session-actions">
                        <a href="/?board_id=${id}" target="_blank">
                            <button class="btn-ghost btn-sm">Open chat</button>
                        </a>
                        <button class="btn-danger btn-sm" onclick="clearSession('${id}')">Clear</button>
                    </div>
                </div>`;
        }).join("");
    }

    async function clearSession(boardId) {
        if (!confirm(`Clear session for ${boardId}?`)) return;
        await fetch(`/admin/clear-session?board_id=${boardId}`, { method: "POST" });
        document.getElementById(`row-${boardId}`)?.remove();
        toast("Session cleared ✓");
        await loadSessions();
    }

    async function clearAllSessions() {
        if (!confirm("Clear ALL sessions? This cannot be undone.")) return;
        await fetch("/admin/clear-all", { method: "POST" });
        toast("All sessions cleared ✓");
        await loadSessions();
    }

    // ---- RESTART ----

    async function doRestart() {
        if (!confirm("Restart the server? It will be unavailable for a few seconds.")) return;
        toast("Restarting...");
        await fetch("/admin/restart", { method: "POST" });
        setTimeout(() => { location.reload(); }, 3000);
    }

    // ---- TOAST ----

    function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
    }

    // Init
    checkAuth();
</script>

</body>
</html>
