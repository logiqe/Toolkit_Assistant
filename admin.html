<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolkit Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- ADMIN-SPECIFIC OVERRIDES --- */

        /* body already set by style.css but we need scrollable for dashboard */
        #admin-page body, body {
            height: auto;
            min-height: 100vh;
        }

        /* LOGIN PAGE */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            gap: 12px;
        }

        #login-page h1 {
            font-size: 1.2em;
            font-weight: 600;
            color: #5E2A03;
        }

        #login-page p {
            color: #888;
            font-size: 14px;
        }

        .login-box {
            background: white;
            border: 1px solid #2c2c2c;
            border-radius: 18px;
            padding: 28px 24px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* DASHBOARD */
        #admin-page {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            padding: 20px clamp(12px, 5vw, 10%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 860px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 40px;
        }

        /* CARDS — same border treatment as .bubble */
        .card {
            background: white;
            border: 1px solid #2c2c2c;
            border-radius: 18px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .card-title {
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #FF8B33;
        }

        /* FIELDS */
        .field { display: flex; flex-direction: column; gap: 5px; }

        label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #2c2c2c;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            color: #5E2A03;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        input:focus, select:focus { border-color: #FF8B33; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 500px) { .field-row { grid-template-columns: 1fr; } }

        /* BUTTONS — reuse send-btn aesthetic */
        .btn-admin {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid #2c2c2c;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn-admin:active { transform: scale(0.97); }
        .btn-admin:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-dark  { background: #5E2A03; color: white; border-color: #5E2A03; }
        .btn-orange { background: #FF8B33; color: white; border-color: #FF8B33; }
        .btn-ghost { background: transparent; color: #5E2A03; }
        .btn-danger { background: transparent; color: #c0392b; border-color: #c0392b; }

        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        /* The login "Sign in" button matches send-btn color */
        .btn-login {
            background: #5E2A03;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
        }

        .btn-login:active { opacity: 0.85; }

        /* HEADER uses style.css header, just override the right side */
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* BADGE — same pill shape as countdown-box feel */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid transparent;
        }

        .badge-green { background: #d4fce8; color: #1a7a45; border-color: #2ed573; }
        .badge-red   { background: #fce4e4; color: #a01a1a; border-color: #c0392b; }
        .badge-dot   { width: 7px; height: 7px; border-radius: 50%; }
        .badge-green .badge-dot { background: #2ed573; }
        .badge-red   .badge-dot { background: #c0392b; }

        /* SESSIONS */
        .sessions-list { display: flex; flex-direction: column; gap: 8px; }

        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FFF8F3;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            padding: 11px 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .session-id {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            color: #5E2A03;
        }

        .session-meta { font-size: 12px; color: #888; }
        .session-actions { display: flex; gap: 8px; align-items: center; }

        .section-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            color: #888;
            font-size: 14px;
            padding: 16px 0;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.07);
            margin: 2px 0;
        }

        .error-msg {
            color: #c0392b;
            font-size: 13px;
            display: none;
        }

        /* TOAST — same style as ai bubble */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #5E2A03;
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.3s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        a { text-decoration: none; }
    </style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="login-page">
    <h1>Toolkit Admin</h1>
    <p>Enter your password to continue</p>
    <div class="login-box">
        <div class="field">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autofocus>
        </div>
        <div id="login-error" class="error-msg">Wrong password.</div>
        <button class="btn-login" onclick="doLogin()">Sign in</button>
    </div>
</div>

<!-- ===== ADMIN DASHBOARD ===== -->
<div id="admin-page">

    <header>
        <span>Toolkit Admin</span>
        <div class="header-right">
            <div id="mqtt-badge" class="badge badge-red"><span class="badge-dot"></span> MQTT</div>
            <button class="btn-admin btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
        </div>
    </header>

    <main>

        <!-- AI CONFIG -->
        <div class="card">
            <div class="card-title">AI Configuration</div>

            <div class="field-row">
                <div class="field">
                    <label>Model</label>
                    <select id="cfg-model">
                        <option value="gpt-4o-mini">gpt-4o-mini — fast & cheap</option>
                        <option value="gpt-4o">gpt-4o — smarter, slower</option>
                        <option value="gpt-4-turbo">gpt-4-turbo</option>
                        <option value="gpt-3.5-turbo">gpt-3.5-turbo (legacy)</option>
                    </select>
                </div>
                <div class="field">
                    <label>OpenAI API Key</label>
                    <input type="password" id="cfg-openai-key" placeholder="sk-...">
                </div>
            </div>

            <div class="field">
                <label>Welcome message</label>
                <input type="text" id="cfg-welcome" placeholder="Welcome! How can I help?">
            </div>

            <div class="section-actions">
                <button class="btn-admin btn-dark" onclick="saveAIConfig()">Save AI config</button>
            </div>
        </div>

        <!-- MQTT CONFIG -->
        <div class="card">
            <div class="card-title">MQTT Configuration</div>

            <div class="field-row">
                <div class="field">
                    <label>Broker</label>
                    <input type="text" id="cfg-broker" placeholder="broker.example.com">
                </div>
                <div class="field">
                    <label>Port</label>
                    <input type="text" id="cfg-port" placeholder="1883">
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="cfg-mqtt-user" placeholder="username">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="cfg-mqtt-password" placeholder="••••••••">
                </div>
            </div>

            <div class="section-actions">
                <button class="btn-admin btn-ghost" onclick="testMQTT()">Test connection</button>
                <button class="btn-admin btn-dark" onclick="saveMQTTConfig()">Save MQTT config</button>
            </div>
        </div>

        <!-- SERVER -->
        <div class="card">
            <div class="card-title">Server</div>
            <p style="font-size:14px; color:#888;">
                Restart the server to apply configuration changes. Sessions are saved before restart.
            </p>
            <div class="section-actions">
                <button class="btn-admin btn-orange" onclick="doRestart()">Save & Restart server</button>
            </div>
        </div>

        <!-- SESSIONS -->
        <div class="card">
            <div class="card-title">Active sessions</div>
            <div id="sessions-list" class="sessions-list">
                <div class="empty-state">Loading...</div>
            </div>
            <hr class="divider">
            <div class="section-actions">
                <button class="btn-admin btn-danger btn-sm" onclick="clearAllSessions()">Clear all sessions</button>
            </div>
        </div>

    </main>
</div>

<div id="toast"></div>

<script>
    const loginPage = document.getElementById("login-page");
    const adminPage = document.getElementById("admin-page");

    async function doLogin() {
        const pw = document.getElementById("login-password").value;
        const err = document.getElementById("login-error");
        err.style.display = "none";

        const res = await fetch("/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw })
        });

        if (res.ok) {
            loginPage.style.display = "none";
            adminPage.style.display = "flex";
            loadAll();
        } else {
            err.style.display = "block";
        }
    }

    document.getElementById("login-password").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
    });

    async function doLogout() {
        await fetch("/admin/logout", { method: "POST" });
        adminPage.style.display = "none";
        loginPage.style.display = "flex";
        document.getElementById("login-password").value = "";
    }

    async function checkAuth() {
        const res = await fetch("/admin/config");
        if (res.ok) {
            loginPage.style.display = "none";
            adminPage.style.display = "flex";
            loadAll();
        }
    }

    async function loadAll() {
        await Promise.all([loadConfig(), loadSessions(), checkMQTT()]);
    }

    async function loadConfig() {
        const res = await fetch("/admin/config");
        if (!res.ok) return;
        const cfg = await res.json();

        const modelSelect = document.getElementById("cfg-model");
        const modelVal = cfg["ASSISTANT_MODEL"] || cfg["assistant_model"] || "";
        for (let opt of modelSelect.options) {
            if (opt.value === modelVal) { opt.selected = true; break; }
        }
        document.getElementById("cfg-welcome").value = cfg["WELCOM_MSG"] || cfg["Welcom_msg"] || "";
        document.getElementById("cfg-broker").value = cfg["MQTT_BROKER"] || cfg["broker"] || "";
        document.getElementById("cfg-port").value = cfg["MQTT_PORT"] || "1883";
        document.getElementById("cfg-mqtt-user").value = cfg["MQTT_USER"] || cfg["mqtt_user"] || "";
    }

    async function saveField(key, value) {
        await fetch("/admin/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, value })
        });
    }

    async function saveAIConfig() {
        const model = document.getElementById("cfg-model").value;
        const key = document.getElementById("cfg-openai-key").value;
        const welcome = document.getElementById("cfg-welcome").value;

        const tasks = [saveField("ASSISTANT_MODEL", model)];
        if (key && !key.includes("*")) tasks.push(saveField("OPENAI_API_KEY", key));
        if (welcome) tasks.push(saveField("WELCOM_MSG", welcome));

        await Promise.all(tasks);
        toast("AI config saved ✓");
    }

    async function saveMQTTConfig() {
        const broker = document.getElementById("cfg-broker").value;
        const port = document.getElementById("cfg-port").value;
        const user = document.getElementById("cfg-mqtt-user").value;
        const pw = document.getElementById("cfg-mqtt-password").value;

        const tasks = [
            saveField("MQTT_BROKER", broker),
            saveField("MQTT_PORT", port),
            saveField("MQTT_USER", user),
        ];
        if (pw && !pw.includes("*")) tasks.push(saveField("MQTT_PASSWORD", pw));

        await Promise.all(tasks);
        toast("MQTT config saved ✓");
    }

    async function checkMQTT() {
        const res = await fetch("/admin/mqtt-test");
        if (!res.ok) return;
        const data = await res.json();
        const badge = document.getElementById("mqtt-badge");
        badge.className = "badge " + (data.connected ? "badge-green" : "badge-red");
        badge.innerHTML = `<span class="badge-dot"></span> MQTT`;
    }

    async function testMQTT() {
        toast("Testing MQTT...");
        await checkMQTT();
        const badge = document.getElementById("mqtt-badge");
        toast(badge.classList.contains("badge-green") ? "MQTT connected ✓" : "MQTT not reachable ✗");
    }

    async function loadSessions() {
        const res = await fetch("/admin/logs");
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById("sessions-list");

        const ids = Object.keys(data);
        if (ids.length === 0) {
            list.innerHTML = `<div class="empty-state">No active sessions</div>`;
            return;
        }

        list.innerHTML = ids.map(id => {
            const s = data[id];
            const msgCount = s.history ? s.history.length : 0;
            return `
                <div class="session-row" id="row-${id}">
                    <div>
                        <div class="session-id">${id}</div>
                        <div class="session-meta">${msgCount} messages</div>
                    </div>
                    <div class="session-actions">
                        <a href="/?board_id=${id}" target="_blank">
                            <button class="btn-admin btn-ghost btn-sm">Open chat</button>
                        </a>
                        <button class="btn-admin btn-danger btn-sm" onclick="clearSession('${id}')">Clear</button>
                    </div>
                </div>`;
        }).join("");
    }

    async function clearSession(boardId) {
        if (!confirm(`Clear session for ${boardId}?`)) return;
        await fetch(`/admin/clear-session?board_id=${boardId}`, { method: "POST" });
        toast("Session cleared ✓");
        await loadSessions();
    }

    async function clearAllSessions() {
        if (!confirm("Clear ALL sessions? This cannot be undone.")) return;
        await fetch("/admin/clear-all", { method: "POST" });
        toast("All sessions cleared ✓");
        await loadSessions();
    }

    async function doRestart() {
        if (!confirm("Restart the server? It will be unavailable for a few seconds.")) return;
        toast("Restarting...");
        await fetch("/admin/restart", { method: "POST" });
        setTimeout(() => { location.reload(); }, 3000);
    }

    function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
    }

    checkAuth();
</script>

</body>
</html>
